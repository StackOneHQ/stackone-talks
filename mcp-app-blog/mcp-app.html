<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>API Explorer</title>
  <style>
    :root {
      --bg: #1e1e2e;
      --surface: #262637;
      --surface-2: #2e2e42;
      --border: #3a3a52;
      --text: #cdd6f4;
      --text-dim: #8888a8;
      --accent: #89b4fa;
      --accent-hover: #74a8fc;
      --green: #a6e3a1;
      --yellow: #f9e2af;
      --red: #f38ba8;
      --orange: #fab387;
      --font-mono: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --radius: 8px;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }

    .header h1 {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 2px;
    }

    .header p {
      font-size: 12px;
      color: var(--text-dim);
    }

    /* Main layout */
    .main {
      display: flex;
      flex: 1;
      min-height: 0;
    }

    .panel {
      flex: 1;
      padding: 16px 20px;
      overflow-y: auto;
      min-width: 0;
    }

    .panel-request {
      border-right: 1px solid var(--border);
    }

    /* Request bar */
    .request-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    select, input, textarea, button {
      font-family: inherit;
      font-size: 13px;
      color: var(--text);
      outline: none;
    }

    select, input, textarea {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 12px;
      transition: border-color 0.15s;
    }

    select:focus, input:focus, textarea:focus {
      border-color: var(--accent);
    }

    select {
      cursor: pointer;
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 600;
      min-width: 100px;
    }

    .url-input {
      flex: 1;
      font-family: var(--font-mono);
      font-size: 13px;
    }

    .send-btn {
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: var(--radius);
      padding: 8px 20px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }

    .send-btn:hover {
      background: var(--accent-hover);
    }

    .send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Section labels */
    .section-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-dim);
      margin-bottom: 8px;
    }

    /* Headers editor */
    .headers-section {
      margin-bottom: 16px;
    }

    .header-row {
      display: flex;
      gap: 8px;
      margin-bottom: 6px;
      align-items: center;
    }

    .header-row input {
      flex: 1;
      font-family: var(--font-mono);
      font-size: 12px;
      padding: 6px 10px;
    }

    .remove-btn {
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      padding: 4px 8px;
      font-size: 14px;
      border-radius: 4px;
      transition: color 0.15s, background 0.15s;
      flex-shrink: 0;
    }

    .remove-btn:hover {
      color: var(--red);
      background: rgba(243, 139, 168, 0.1);
    }

    .add-header-btn {
      background: none;
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-dim);
      cursor: pointer;
      padding: 6px 12px;
      font-size: 12px;
      width: 100%;
      transition: color 0.15s, border-color 0.15s;
    }

    .add-header-btn:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    /* Body editor */
    .body-section {
      margin-bottom: 16px;
    }

    .body-editor {
      width: 100%;
      min-height: 120px;
      resize: vertical;
      font-family: var(--font-mono);
      font-size: 12px;
      line-height: 1.6;
    }

    /* Response panel */
    .response-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      font-size: 12px;
    }

    .status-badge {
      font-family: var(--font-mono);
      font-weight: 600;
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 4px;
    }

    .status-2xx {
      color: var(--green);
      background: rgba(166, 227, 161, 0.15);
    }

    .status-3xx {
      color: var(--yellow);
      background: rgba(249, 226, 175, 0.15);
    }

    .status-4xx {
      color: var(--orange);
      background: rgba(250, 179, 135, 0.15);
    }

    .status-5xx {
      color: var(--red);
      background: rgba(243, 139, 168, 0.15);
    }

    .status-err {
      color: var(--red);
      background: rgba(243, 139, 168, 0.15);
    }

    .timing {
      color: var(--text-dim);
      font-family: var(--font-mono);
    }

    .size-info {
      color: var(--text-dim);
      font-family: var(--font-mono);
    }

    /* Response tabs */
    .response-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 12px;
    }

    .response-tab {
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 500;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
    }

    .response-tab:hover {
      color: var(--text);
      background: var(--surface-2);
    }

    .response-tab.active {
      color: var(--accent);
      background: var(--surface-2);
    }

    /* Response body */
    .response-body {
      flex: 1;
      min-height: 0;
    }

    .response-body pre {
      font-family: var(--font-mono);
      font-size: 12px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      overflow-y: auto;
      max-height: 400px;
    }

    .response-body pre.error-pre {
      color: var(--red);
    }

    /* Syntax highlighting */
    .json-key { color: var(--accent); }
    .json-string { color: var(--green); }
    .json-number { color: var(--orange); }
    .json-boolean { color: var(--yellow); }
    .json-null { color: var(--red); }

    /* Response headers table */
    .headers-table {
      width: 100%;
      border-collapse: collapse;
      font-family: var(--font-mono);
      font-size: 12px;
    }

    .headers-table th,
    .headers-table td {
      text-align: left;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
    }

    .headers-table th {
      color: var(--text-dim);
      font-weight: 600;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .headers-table td:first-child {
      color: var(--accent);
      white-space: nowrap;
    }

    .no-headers-msg {
      color: var(--text-dim);
      font-size: 13px;
      padding: 20px 0;
      text-align: center;
    }

    /* Empty state */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      color: var(--text-dim);
    }

    .empty-state .arrow-icon {
      font-size: 32px;
      margin-bottom: 12px;
      opacity: 0.4;
    }

    .empty-state p {
      font-size: 13px;
    }

    /* Loading spinner */
    .spinner {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    .spinner::after {
      content: '';
      width: 24px;
      height: 24px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* History bar */
    .history-bar {
      border-top: 1px solid var(--border);
      padding: 8px 20px;
      display: flex;
      gap: 6px;
      overflow-x: auto;
      white-space: nowrap;
      min-height: 42px;
      align-items: center;
    }

    .history-bar:empty {
      display: none;
    }

    .history-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 10px;
      cursor: pointer;
      font-size: 11px;
      transition: border-color 0.15s;
      flex-shrink: 0;
    }

    .history-item:hover {
      border-color: var(--accent);
    }

    .history-method {
      font-family: var(--font-mono);
      font-weight: 700;
      font-size: 10px;
    }

    .history-path {
      color: var(--text-dim);
      font-family: var(--font-mono);
      font-size: 11px;
      max-width: 160px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <h1>API Explorer</h1>
    <p>Interactive HTTP client inside your conversation</p>
  </div>

  <!-- Main -->
  <div class="main">
    <!-- Request Panel -->
    <div class="panel panel-request">
      <div class="request-bar">
        <select id="method">
          <option value="GET">GET</option>
          <option value="POST">POST</option>
          <option value="PUT">PUT</option>
          <option value="PATCH">PATCH</option>
          <option value="DELETE">DELETE</option>
          <option value="HEAD">HEAD</option>
          <option value="OPTIONS">OPTIONS</option>
        </select>
        <input id="url" type="text" class="url-input" placeholder="https://api.example.com/endpoint" />
        <button id="send-btn" class="send-btn">Send</button>
      </div>

      <div class="headers-section">
        <div class="section-label">Headers</div>
        <div id="headers-editor">
          <div class="header-row">
            <input type="text" placeholder="Key" class="header-key" />
            <input type="text" placeholder="Value" class="header-value" />
            <button class="remove-btn">&times;</button>
          </div>
        </div>
        <button id="add-header-btn" class="add-header-btn">+ Add Header</button>
      </div>

      <div class="body-section">
        <div class="section-label">Body</div>
        <textarea id="body-editor" class="body-editor" placeholder='{"key": "value"}'></textarea>
      </div>
    </div>

    <!-- Response Panel -->
    <div class="panel panel-response">
      <div id="response-meta" class="response-meta" style="display:none">
        <span id="status-badge" class="status-badge"></span>
        <span id="timing" class="timing"></span>
        <span id="size-info" class="size-info"></span>
      </div>

      <div id="response-tabs" class="response-tabs" style="display:none">
        <button class="response-tab active" data-tab="body">Body</button>
        <button class="response-tab" data-tab="headers">Headers</button>
      </div>

      <div id="response-body" class="response-body">
        <div id="empty-state" class="empty-state">
          <div class="arrow-icon">&larr;</div>
          <p>Enter a URL and hit Send</p>
        </div>
      </div>
    </div>
  </div>

  <!-- History bar -->
  <div id="history-bar" class="history-bar"></div>

  <script type="module" src="/src/mcp-app.ts"></script>
</body>
</html>
