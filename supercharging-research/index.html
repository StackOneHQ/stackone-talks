<style>

  /* Pipeline flow */

  /* Method boxes */

  /* Big quote */

  /* Demo slide */

  .demo-sub { font-size: 1.4rem; font-weight: 400; color: #666; margin-top: 1rem; }

  .slide-counter {
    position: fixed;
    bottom: 16px; right: 24px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem; color: #555;
    z-index: 100;

  }

  /* ── Severance / Lumon Industries aesthetic ── */
  .severance {}

  .sev-two-col {

  .sev-two-col > div {

  /* ── Demo mode: slides shrink to left half ── */
  body.demo-mode .slide { width: 50vw; }
  body.demo-mode .slide svg.slide-svg { width: 50vw; }
  body.demo-mode .content { font-size: 1.5rem; }
  body.demo-mode .title-slide .title { font-size: 2.2rem; }
  body.demo-mode .slide-heading { font-size: 1.6rem; margin-bottom: 1.2rem; }
  body.demo-mode .term { font-size: 0.95rem; padding: 1rem 1.2rem; }
  body.demo-mode .methods .method h3 { font-size: 1rem; }
  body.demo-mode .methods .method p { font-size: 0.8rem; }
  body.demo-mode .demo-label { font-size: 3rem; }
  body.demo-mode .demo-sub { font-size: 1rem; }
  body.demo-mode .pipeline .step { font-size: 1rem; padding: 0.5rem 0.8rem; }
  body.demo-mode .protocol-title { font-size: 1.8rem; }
  body.demo-mode .protocol-box { padding: 1.2rem 1.5rem; max-width: 400px; }
  body.demo-mode .protocol-box p { font-size: 0.85rem; }
  body.demo-mode .sev-card { padding: 2rem 3rem; }
  body.demo-mode .sev-card-title { font-size: 1.6rem; }
  body.demo-mode .sev-two-col { max-width: 440px; }
  body.demo-mode .dept-header { font-size: 0.55rem; }

  .demo-panel {
    display: none;
    position: fixed;
    top: 0; left: 50vw;
    width: 50vw; height: 100vh;
    background: #111114;
    border-left: 2px solid #333;
    z-index: 50;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  body.demo-mode .demo-panel { display: flex; }
  .demo-panel-text { font-family: 'JetBrains Mono', monospace; color: #333; font-size: 1.2rem; text-align: center; line-height: 2; }
  .demo-panel-text span { color: #4A9E7E; }

  .mode-indicator {
    display: none;
    position: fixed;
    top: 12px; left: 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem; color: #4A9E7E;
    z-index: 200;
    padding: 4px 10px;

  body.demo-mode .mode-indicator { display: block; }
</style>
</head>
<body>

<div id="deck"></div>
<div class="slide-counter" id="counter"></div>
<div class="mode-indicator">DEMO MODE &mdash; press D to exit</div>

<div class="demo-panel">
  <div class="demo-panel-text">
    <span>terminal goes here</span><br>
    resize this window to left half<br>
    and open terminal on the right<br><br>
    or use <span>Cmd+Tab</span> to switch
  </div>
</div>

<script>
let TOTAL = 18; // updated by SLIDES.length after definition
const GREEN = '#4A9E7E';
const DOT_SIZE = 21;
const DOT_R = 7;
const STROKE = 3;
const GAP = 7;
const ANIM_MS = 400;

let demoMode = false;

const BORDER = [
  { x: 0.12, y: 0.12 },
  { x: 0.50, y: 0.12 },
  { x: 0.88, y: 0.12 },
  { x: 0.88, y: 0.50 },
  { x: 0.88, y: 0.88 },
  { x: 0.50, y: 0.88 },
  { x: 0.12, y: 0.88 },
  { x: 0.12, y: 0.50 },
];

function seededRandom(seed) {
  let s = seed;
  return function () {
    s = (s * 16807) % 2147483647;
    return (s - 1) / 2147483646;
  };
}
const rand = seededRandom(77);

const slideDotIdx = [];
for (let i = 0; i < TOTAL; i++) {
  let idx;
  do { idx = Math.floor(rand() * 8); } while (i > 0 && idx === slideDotIdx[i - 1]);
  slideDotIdx.push(idx);
}

function perimDist(a, b) {
  const cw = (b - a + 8) % 8;
  return Math.min(cw, 8 - cw);
}

function shortestArc(from, to) {
  if (from === to) return [from];
  const cw = (to - from + 8) % 8;
  const ccw = (from - to + 8) % 8;
  const step = cw <= ccw ? 1 : -1;
  const path = [from];
  let cur = from;
  while (cur !== to) {
    cur = (cur + step + 8) % 8;
    path.push(cur);
  }
  return path;
}

const CORRIDORS = [
  { exit: 6, enter: 0 },
  { exit: 5, enter: 1 },
  { exit: 4, enter: 2 },
];

const transCorridors = [];
for (let i = 0; i < TOTAL - 1; i++) {
  const a = slideDotIdx[i], b = slideDotIdx[i + 1];
  let arrivalNeighbor = -1;
  if (i > 0) {
    const prev = transCorridors[i - 1];
    const inArc = shortestArc(prev.enter, a);
    if (inArc.length >= 2) arrivalNeighbor = inArc[inArc.length - 2];
  }
  let best = null, bestCost = Infinity;
  for (const c of CORRIDORS) {
    const outArc = shortestArc(a, c.exit);
    if (outArc.length >= 2 && outArc[1] === arrivalNeighbor) continue;
    const cost = perimDist(a, c.exit) + perimDist(c.enter, b);
    if (cost < bestCost) { bestCost = cost; best = c; }
  }
  if (!best) {
    bestCost = Infinity;
    for (const c of CORRIDORS) {
      const cost = perimDist(a, c.exit) + perimDist(c.enter, b);
      if (cost < bestCost) { bestCost = cost; best = c; }
    }
  }
  transCorridors.push(best);
}

function transitionPaths(transIdx, vw, vh) {
  const a = slideDotIdx[transIdx], b = slideDotIdx[transIdx + 1];
  const corr = transCorridors[transIdx];
  const outArc = shortestArc(a, corr.exit);
  const outPts = outArc.map(i => ({ x: BORDER[i].x * vw, y: BORDER[i].y * vh }));
  outPts.push({ x: BORDER[corr.exit].x * vw, y: vh + 40 });
  const inArc = shortestArc(corr.enter, b);
  const inPts = [{ x: BORDER[corr.enter].x * vw, y: -40 }];
  inArc.forEach(i => inPts.push({ x: BORDER[i].x * vw, y: BORDER[i].y * vh }));
  return { outPts, inPts };
}

function ptsString(pts) { return pts.map(p => `${p.x},${p.y}`).join(' '); }

function ptsLength(pts) {
  let l = 0;
  for (let i = 1; i < pts.length; i++) {
    const dx = pts[i].x - pts[i - 1].x, dy = pts[i].y - pts[i - 1].y;
    l += Math.sqrt(dx * dx + dy * dy);
  }
  return l;
}

function trimStart(pts, amt) {
  if (pts.length < 2 || amt <= 0) return [...pts];
  let rem = amt, i = 0;
  while (i < pts.length - 1) {
    const dx = pts[i + 1].x - pts[i].x, dy = pts[i + 1].y - pts[i].y;
    const seg = Math.sqrt(dx * dx + dy * dy);
    if (rem >= seg) { rem -= seg; i++; } else {
      const t = rem / seg;
      const out = [{ x: pts[i].x + dx * t, y: pts[i].y + dy * t }];
      for (let j = i + 1; j < pts.length; j++) out.push(pts[j]);
      return out;
    }
  }
  return [pts[pts.length - 1]];
}

function trimEnd(pts, amt) {
  return trimStart([...pts].reverse(), amt).reverse();
}

let currentSlide = 0;
let transitioning = false;
const deck = document.getElementById('deck');
const counter = document.getElementById('counter');

function getEffectiveWidth() {
  return demoMode ? window.innerWidth / 2 : window.innerWidth;
}

function buildSlides() {
  deck.innerHTML = '';
  const vw = getEffectiveWidth(), vh = window.innerHeight;

  for (let i = 0; i < TOTAL; i++) {
    const slide = document.createElement('div');
    slide.className = 'slide' + (i === currentSlide ? ' active' : '');

    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.setAttribute('class', 'slide-svg');
    svg.setAttribute('viewBox', `0 0 ${vw} ${vh}`);
    svg.setAttribute('preserveAspectRatio', 'none');

    const idx = slideDotIdx[i];
    const cx = BORDER[idx].x * vw, cy = BORDER[idx].y * vh;

    const dot = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    dot.setAttribute('x', cx - DOT_SIZE / 2);
    dot.setAttribute('y', cy - DOT_SIZE / 2);
    dot.setAttribute('width', DOT_SIZE);
    dot.setAttribute('height', DOT_SIZE);
    dot.setAttribute('rx', DOT_R);
    dot.setAttribute('ry', DOT_R);
    dot.setAttribute('fill', GREEN);
    svg.appendChild(dot);

    if (i > 0) {
      const { inPts } = transitionPaths(i - 1, vw, vh);
      const pts = trimEnd(inPts, GAP + DOT_SIZE / 2);
      if (pts.length >= 2) svg.appendChild(makeLine(pts, 'incoming-line'));
    }
    if (i < TOTAL - 1) {
      const { outPts } = transitionPaths(i, vw, vh);
      const pts = trimStart(outPts, GAP + DOT_SIZE / 2);
      if (pts.length >= 2) svg.appendChild(makeLine(pts, 'outgoing-line'));
    }

    slide.appendChild(svg);

    // Severance slides get the grid + dept header
    if (SLIDES[i] && SLIDES[i].sev) {
      slide.classList.add('severance');
      const dh = document.createElement('div');
      dh.className = 'dept-header';
      dh.textContent = 'Department of Agent Refinement';
      slide.appendChild(dh);
    }

    const content = document.createElement('div');
    content.className = 'content';
    if (SLIDES[i]) {
      if (SLIDES[i].cls) slide.classList.add(SLIDES[i].cls);
      // Auto-inject numeral into first .slide-heading if num is set
      let html = SLIDES[i].html;
      if (SLIDES[i].num) {
        const tag = '<div class="slide-heading">';
        const idx = html.indexOf(tag);
        if (idx !== -1) {
          html = html.slice(0, idx + tag.length)
            + `<span class="slide-num">${SLIDES[i].num}</span> `
            + html.slice(idx + tag.length);
        }
      }
      content.innerHTML = html;
    } else {
      content.textContent = `Slide ${i + 1}`;
    }
    slide.appendChild(content);
    deck.appendChild(slide);
  }
  updateCounter();
}

function makeLine(pts, cls) {
  const len = ptsLength(pts);
  const pl = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
  pl.setAttribute('points', ptsString(pts));
  pl.setAttribute('fill', 'none');
  pl.setAttribute('stroke', GREEN);
  pl.setAttribute('stroke-width', STROKE);
  pl.setAttribute('stroke-linecap', 'round');
  pl.setAttribute('stroke-linejoin', 'round');
  pl.setAttribute('stroke-dasharray', len);
  pl.setAttribute('stroke-dashoffset', len);
  pl.setAttribute('class', cls);
  pl.dataset.length = len;
  return pl;
}

function updateCounter() {
  counter.textContent = `${currentSlide + 1} / ${TOTAL}`;
}

function getSlide(i) { return deck.querySelectorAll('.slide')[i]; }

function animLine(el, mode) {
  return new Promise(resolve => {
    if (!el) return resolve();
    const len = parseFloat(el.dataset.length);
    if (mode === 'draw') {
      el.getBoundingClientRect();
      el.style.transition = `stroke-dashoffset ${ANIM_MS}ms ease-out`;
      el.setAttribute('stroke-dashoffset', '0');
      setTimeout(resolve, ANIM_MS);
    } else if (mode === 'undraw') {
      el.getBoundingClientRect();
      el.style.transition = `stroke-dashoffset ${ANIM_MS}ms ease-in`;
      el.setAttribute('stroke-dashoffset', len);
      setTimeout(resolve, ANIM_MS);
    } else if (mode === 'reset-drawn') {
      el.style.transition = 'none';
      el.setAttribute('stroke-dashoffset', '0');
      resolve();
    } else {
      el.style.transition = 'none';
      el.setAttribute('stroke-dashoffset', len);
      resolve();
    }
  });
}

async function goForward() {
  if (transitioning || currentSlide >= TOTAL - 1) return;
  transitioning = true;
  const curr = getSlide(currentSlide);
  const next = getSlide(currentSlide + 1);
  await animLine(curr.querySelector('.outgoing-line'), 'draw');
  curr.classList.remove('active');
  next.classList.add('active');
  currentSlide++;
  updateCounter();
  await animLine(next.querySelector('.incoming-line'), 'draw');
  transitioning = false;
}

async function goBackward() {
  if (transitioning || currentSlide <= 0) return;
  transitioning = true;
  const curr = getSlide(currentSlide);
  const target = getSlide(currentSlide - 1);
  await animLine(curr.querySelector('.incoming-line'), 'undraw');
  curr.classList.remove('active');
  target.classList.add('active');
  currentSlide--;
  updateCounter();
  await animLine(target.querySelector('.outgoing-line'), 'undraw');
  transitioning = false;
}

function jumpForward() {
  if (transitioning || currentSlide >= TOTAL - 1) return;
  const curr = getSlide(currentSlide);
  const next = getSlide(currentSlide + 1);
  animLine(curr.querySelector('.outgoing-line'), 'reset-drawn');
  curr.classList.remove('active');
  next.classList.add('active');
  currentSlide++;
  animLine(next.querySelector('.incoming-line'), 'reset-drawn');
  updateCounter();
}

function jumpBackward() {
  if (transitioning || currentSlide <= 0) return;
  const curr = getSlide(currentSlide);
  const target = getSlide(currentSlide - 1);
  animLine(curr.querySelector('.incoming-line'), 'reset');
  curr.classList.remove('active');
  target.classList.add('active');
  currentSlide--;
  animLine(target.querySelector('.outgoing-line'), 'reset');
  updateCounter();
}

function toggleDemoMode() {
  demoMode = !demoMode;
  document.body.classList.toggle('demo-mode', demoMode);
  buildSlides();
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); goForward(); }
  else if (e.key === 'ArrowLeft') { e.preventDefault(); goBackward(); }
  else if (e.key === 'ArrowDown') { e.preventDefault(); jumpForward(); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); jumpBackward(); }
  else if (e.key === 'd' || e.key === 'D') { e.preventDefault(); toggleDemoMode(); }
});

// ── slide content ──
const SLIDES = [

  // ── PART 1: INTRO ──

  // Title
  {
    cls: 'title-slide',
    html: `<div class="title"><span>Supercharging</span> Research with Agents</div>
<div class="subtitle"><span class="author">Will Leeney PhD</span><span class="affiliation">AI Research Engineering @<img class="stackone-logo" src="https://www.stackone.com/favicon.svg" alt="StackOne"> StackOne</span></div>`
  },

  // Assumptions & Requirements
  {
    num: '0.',
    html: `<div class="slide-heading">Assumptions</div>
