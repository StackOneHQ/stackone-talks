<div id="deck"></div>

<script>
const TOTAL = 21;
const GREEN = '#4A9E7E';
const RED = '#e05252';
const DOT_SIZE = 21;
const DOT_R = 7;
const STROKE = 3;
const GAP = 7;
const ANIM_MS = 400;

const BORDER = [
  { x: 0.10, y: 0.10 },
  { x: 0.50, y: 0.10 },
  { x: 0.90, y: 0.10 },
  { x: 0.90, y: 0.50 },
  { x: 0.90, y: 0.90 },
  { x: 0.50, y: 0.90 },
  { x: 0.10, y: 0.90 },
  { x: 0.10, y: 0.50 },
];

function seededRandom(seed) {
  let s = seed;
  return function () { s = (s * 16807) % 2147483647; return (s - 1) / 2147483646; };
}
const rand = seededRandom(42);

const slideDotIdx = [];
for (let i = 0; i < TOTAL; i++) {
  let idx;
  do { idx = Math.floor(rand() * 8); } while (i > 0 && idx === slideDotIdx[i - 1]);
  slideDotIdx.push(idx);
}

function perimDist(a, b) { const cw = (b - a + 8) % 8; return Math.min(cw, 8 - cw); }
function shortestArc(from, to) {
  if (from === to) return [from];
  const cw = (to - from + 8) % 8, ccw = (from - to + 8) % 8, step = cw <= ccw ? 1 : -1;
  const path = [from]; let cur = from;
  while (cur !== to) { cur = (cur + step + 8) % 8; path.push(cur); }
  return path;
}

const CORRIDORS = [{ exit: 6, enter: 0 }, { exit: 5, enter: 1 }, { exit: 4, enter: 2 }];
const transCorridors = [];
for (let i = 0; i < TOTAL - 1; i++) {
  const a = slideDotIdx[i], b = slideDotIdx[i + 1];
  let arrivalNeighbor = -1;
  if (i > 0) { const prev = transCorridors[i - 1]; const inArc = shortestArc(prev.enter, a); if (inArc.length >= 2) arrivalNeighbor = inArc[inArc.length - 2]; }
  let best = null, bestCost = Infinity;
  for (const c of CORRIDORS) { const outArc = shortestArc(a, c.exit); if (outArc.length >= 2 && outArc[1] === arrivalNeighbor) continue; const cost = perimDist(a, c.exit) + perimDist(c.enter, b); if (cost < bestCost) { bestCost = cost; best = c; } }
  if (!best) { for (const c of CORRIDORS) { const cost = perimDist(a, c.exit) + perimDist(c.enter, b); if (cost < bestCost) { bestCost = cost; best = c; } } }
  transCorridors.push(best);
}

function transitionPaths(ti, vw, vh) {
  const a = slideDotIdx[ti], b = slideDotIdx[ti + 1], corr = transCorridors[ti];
  const outArc = shortestArc(a, corr.exit), outPts = outArc.map(i => ({ x: BORDER[i].x * vw, y: BORDER[i].y * vh }));
  outPts.push({ x: BORDER[corr.exit].x * vw, y: vh + 40 });
  const inArc = shortestArc(corr.enter, b), inPts = [{ x: BORDER[corr.enter].x * vw, y: -40 }];
  inArc.forEach(i => inPts.push({ x: BORDER[i].x * vw, y: BORDER[i].y * vh }));
  return { outPts, inPts };
}

function ptsString(pts) { return pts.map(p => `${p.x},${p.y}`).join(' '); }
function ptsLength(pts) { let l = 0; for (let i = 1; i < pts.length; i++) { const dx = pts[i].x - pts[i-1].x, dy = pts[i].y - pts[i-1].y; l += Math.sqrt(dx*dx+dy*dy); } return l; }
function trimStart(pts, amt) { if (pts.length < 2 || amt <= 0) return [...pts]; let rem = amt, i = 0; while (i < pts.length - 1) { const dx = pts[i+1].x - pts[i].x, dy = pts[i+1].y - pts[i].y; const seg = Math.sqrt(dx*dx+dy*dy); if (rem >= seg) { rem -= seg; i++; } else { const t = rem / seg; const out = [{ x: pts[i].x + dx*t, y: pts[i].y + dy*t }]; for (let j = i+1; j < pts.length; j++) out.push(pts[j]); return out; } } return [pts[pts.length-1]]; }
function trimEnd(pts, amt) { return trimStart([...pts].reverse(), amt).reverse(); }

let currentSlide = 0, transitioning = false;
const deck = document.getElementById('deck'), counter = document.getElementById('counter');

function buildSlides() {
  deck.innerHTML = '';
  const vw = window.innerWidth, vh = window.innerHeight;
  for (let i = 0; i < TOTAL; i++) {
    const slide = document.createElement('div');
    slide.className = 'slide' + (i === currentSlide ? ' active' : '');
    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.setAttribute('class', 'slide-svg'); svg.setAttribute('viewBox', `0 0 ${vw} ${vh}`); svg.setAttribute('preserveAspectRatio', 'none');
    const idx = slideDotIdx[i], cx = BORDER[idx].x * vw, cy = BORDER[idx].y * vh;
    const dot = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    dot.setAttribute('x', cx - DOT_SIZE/2); dot.setAttribute('y', cy - DOT_SIZE/2); dot.setAttribute('width', DOT_SIZE); dot.setAttribute('height', DOT_SIZE); dot.setAttribute('rx', DOT_R); dot.setAttribute('ry', DOT_R); dot.setAttribute('fill', GREEN);
    svg.appendChild(dot);
    if (i > 0) { const { inPts } = transitionPaths(i-1, vw, vh); const pts = trimEnd(inPts, GAP + DOT_SIZE/2); if (pts.length >= 2) svg.appendChild(makeLine(pts, 'incoming-line')); }
    if (i < TOTAL - 1) { const { outPts } = transitionPaths(i, vw, vh); const pts = trimStart(outPts, GAP + DOT_SIZE/2); if (pts.length >= 2) svg.appendChild(makeLine(pts, 'outgoing-line')); }
    slide.appendChild(svg);
    const content = document.createElement('div'); content.className = 'content';
    if (SLIDE_HTML[i]) { if (SLIDE_HTML[i].cls) slide.classList.add(SLIDE_HTML[i].cls); content.innerHTML = SLIDE_HTML[i].html; }
    else { content.textContent = `Slide ${i + 1}`; }
    slide.appendChild(content); deck.appendChild(slide);
  }
  updateCounter();
}

function makeLine(pts, cls) {
  const len = ptsLength(pts);
  const pl = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
  pl.setAttribute('points', ptsString(pts)); pl.setAttribute('fill', 'none'); pl.setAttribute('stroke', GREEN); pl.setAttribute('stroke-width', STROKE); pl.setAttribute('stroke-linecap', 'round'); pl.setAttribute('stroke-linejoin', 'round'); pl.setAttribute('stroke-dasharray', len); pl.setAttribute('stroke-dashoffset', len); pl.setAttribute('class', cls); pl.dataset.length = len;
  return pl;
}

function updateCounter() { counter.textContent = `${currentSlide + 1} / ${TOTAL}`; }
function getSlide(i) { return deck.querySelectorAll('.slide')[i]; }
function animLine(el, mode) {
  return new Promise(resolve => {
    if (!el) return resolve();
    const len = parseFloat(el.dataset.length);
    if (mode === 'draw') { el.getBoundingClientRect(); el.style.transition = `stroke-dashoffset ${ANIM_MS}ms ease-out`; el.setAttribute('stroke-dashoffset', '0'); setTimeout(resolve, ANIM_MS); }
    else if (mode === 'undraw') { el.getBoundingClientRect(); el.style.transition = `stroke-dashoffset ${ANIM_MS}ms ease-in`; el.setAttribute('stroke-dashoffset', len); setTimeout(resolve, ANIM_MS); }
    else if (mode === 'reset-drawn') { el.style.transition = 'none'; el.setAttribute('stroke-dashoffset', '0'); resolve(); }
    else { el.style.transition = 'none'; el.setAttribute('stroke-dashoffset', len); resolve(); }
  });
}
async function goForward() { if (transitioning || currentSlide >= TOTAL-1) return; transitioning = true; const curr = getSlide(currentSlide), next = getSlide(currentSlide+1); await animLine(curr.querySelector('.outgoing-line'), 'draw'); curr.classList.remove('active'); next.classList.add('active'); currentSlide++; updateCounter(); await animLine(next.querySelector('.incoming-line'), 'draw'); transitioning = false; }
async function goBackward() { if (transitioning || currentSlide <= 0) return; transitioning = true; const curr = getSlide(currentSlide), target = getSlide(currentSlide-1); await animLine(curr.querySelector('.incoming-line'), 'undraw'); curr.classList.remove('active'); target.classList.add('active'); currentSlide--; updateCounter(); await animLine(target.querySelector('.outgoing-line'), 'undraw'); transitioning = false; }
function jumpForward() { if (transitioning || currentSlide >= TOTAL-1) return; const curr = getSlide(currentSlide), next = getSlide(currentSlide+1); animLine(curr.querySelector('.outgoing-line'), 'reset-drawn'); curr.classList.remove('active'); next.classList.add('active'); currentSlide++; animLine(next.querySelector('.incoming-line'), 'reset-drawn'); updateCounter(); }
function jumpBackward() { if (transitioning || currentSlide <= 0) return; const curr = getSlide(currentSlide), target = getSlide(currentSlide-1); animLine(curr.querySelector('.incoming-line'), 'reset'); curr.classList.remove('active'); target.classList.add('active'); currentSlide--; animLine(target.querySelector('.outgoing-line'), 'reset'); updateCounter(); }
document.addEventListener('keydown', e => { if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); goForward(); } else if (e.key === 'ArrowLeft') { e.preventDefault(); goBackward(); } else if (e.key === 'ArrowDown') { e.preventDefault(); jumpForward(); } else if (e.key === 'ArrowUp') { e.preventDefault(); jumpBackward(); } });

// --- SLIDES ---

  // 1. TITLE

    html: `<div class="title">Building Advanced Agents That Can <span>Act</span><br>with StackOne and ADK</div>

  <span style="font-size:0.9rem;color:#888;font-weight:400">github.com/StackOneHQ/ecommerce-assistant-adk-demo</span>

  },
